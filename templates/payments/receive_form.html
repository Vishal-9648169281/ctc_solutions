{% extends 'base.html' %}
{% block title %}Receive Payment{% endblock %}
{% block content %}

<div class="page-header">
    <h5><i class="fa fa-money me-2"></i>Receive Payment</h5>
    <a href="/payments/receive/" class="btn btn-ctc-outline btn-sm"><i class="fa fa-arrow-left me-1"></i>Back</a>
</div>

<form method="post">
    {% csrf_token %}

    <div class="ctc-card mb-3">
        <div class="ctc-card-header">
            <i class="fa fa-file-text me-2"></i>Receipt Information
        </div>
        <div class="ctc-card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label-sm">Receipt Number</label>
                    <input type="text" class="form-control form-control-sm" value="{{ receipt_number }}" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label-sm">Customer <span class="text-danger">*</span></label>
                    <select name="customer" class="form-select form-select-sm" required>
                        <option value="">-- Select Customer --</option>
                        {% for c in customers %}
                        <option value="{{ c.pk }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label-sm">Against Invoice</label>
                    <select name="invoice" class="form-select form-select-sm">
                        <option value="">-- Select Invoice (Optional) --</option>
                        {% for inv in invoices %}
                        <option value="{{ inv.pk }}">{{ inv.invoice_number }} - Rs.{{ inv.balance_due }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="ctc-card mb-3">
        <div class="ctc-card-header">
            <i class="fa fa-credit-card me-2"></i>Payment Details
        </div>
        <div class="ctc-card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label-sm">Payment Date <span class="text-danger">*</span></label>
                    <input type="date" name="payment_date" class="form-control form-control-sm" value="{{ today }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label-sm">Amount <span class="text-danger">*</span></label>
                    <input type="number" name="amount" class="form-control form-control-sm" step="0.01" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label-sm">Payment Mode</label>
                    <select name="payment_mode" class="form-select form-select-sm">
                        <option value="cash">Cash</option>
                        <option value="bank">Bank Transfer</option>
                        <option value="cheque">Cheque</option>
                        <option value="upi">UPI</option>
                        <option value="card">Card</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label-sm">Reference Number</label>
                    <input type="text" name="reference_number" class="form-control form-control-sm" placeholder="Cheque/UTR/UPI ID">
                </div>
                <div class="col-md-6">
                    <label class="form-label-sm">Notes</label>
                    <input type="text" name="notes" class="form-control form-control-sm">
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 mb-4">
        <button type="submit" class="btn btn-ctc btn-sm"><i class="fa fa-save me-1"></i>Save Payment</button>
        <a href="/payments/receive/" class="btn btn-ctc-outline btn-sm"><i class="fa fa-times me-1"></i>Cancel</a>
    </div>
</form>

{% endblock %}
