{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}

<div class="page-header">
    <h5><i class="fa fa-truck me-2"></i>{{ title }}</h5>
    <a href="/masters/vendors/" class="btn btn-ctc-outline btn-sm"><i class="fa fa-arrow-left me-1"></i>Back</a>
</div>

<form method="post">
    {% csrf_token %}

    <div class="ctc-card mb-3">
        <div class="ctc-card-header">
            <i class="fa fa-address-card me-2"></i>Basic Information
        </div>
        <div class="ctc-card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label-sm">Name <span class="text-danger">*</span></label>
                    <input type="text" name="name" value="{{ obj.name|default:'' }}" class="form-control form-control-sm" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label-sm">Phone <span class="text-danger">*</span></label>
                    <input type="text" name="phone" value="{{ obj.phone|default:'' }}" class="form-control form-control-sm" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label-sm">Email</label>
                    <input type="email" name="email" value="{{ obj.email|default:'' }}" class="form-control form-control-sm">
                </div>
                <div class="col-md-6">
                    <label class="form-label-sm">GSTIN</label>
                    <input type="text" name="gstin" value="{{ obj.gstin|default:'' }}" class="form-control form-control-sm" maxlength="15">
                </div>
            </div>
        </div>
    </div>

    <div class="ctc-card mb-3">
        <div class="ctc-card-header">
            <i class="fa fa-map-marker me-2"></i>Address Details
        </div>
        <div class="ctc-card-body">
            <div class="row g-3">
                <div class="col-md-12">
                    <label class="form-label-sm">Address</label>
                    <textarea name="address" class="form-control form-control-sm" rows="2">{{ obj.address|default:'' }}</textarea>
                </div>
                <div class="col-md-4">
                    <label class="form-label-sm">City</label>
                    <input type="text" name="city" value="{{ obj.city|default:'' }}" class="form-control form-control-sm">
                </div>
                <div class="col-md-4">
                    <label class="form-label-sm">State</label>
                    <input type="text" name="state" value="{{ obj.state|default:'' }}" class="form-control form-control-sm">
                </div>
                <div class="col-md-4">
                    <label class="form-label-sm">Pincode</label>
                    <input type="text" name="pincode" value="{{ obj.pincode|default:'' }}" class="form-control form-control-sm">
                </div>
            </div>
        </div>
    </div>

    <div class="ctc-card mb-3">
        <div class="ctc-card-header">
            <i class="fa fa-rupee me-2"></i>Financial Details
        </div>
        <div class="ctc-card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label-sm">Opening Balance</label>
                    <input type="number" name="opening_balance" value="{{ obj.opening_balance|default:'0' }}" class="form-control form-control-sm" step="0.01">
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 mb-4">
        <button type="submit" class="btn btn-ctc btn-sm"><i class="fa fa-save me-1"></i>Save Vendor</button>
        <a href="/masters/vendors/" class="btn btn-ctc-outline btn-sm"><i class="fa fa-times me-1"></i>Cancel</a>
    </div>
</form>

{% endblock %}
