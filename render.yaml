services:
  - type: web
    name: ctc-solution
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn ctc_solution.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ctc-solution-db
          property: connectionString

databases:
  - name: ctc-solution-db
    databaseName: ctc_solution
    user: ctc_admin
